# ── HTTP → HTTPS redirect ─────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name _;   # Replace with your domain or EC2 public IP

    # SSL certificates (Let's Encrypt or self-signed)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── React frontend (static files) ────────────────────────────
    root  /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA fallback
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Cache hashed JS/CSS bundles for a year
    location ~* \.(js|css|woff2?|png|jpg|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── FastAPI backend (reverse proxy) ─────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Long timeouts for Phase 4/5 heavy endpoints (10 minutes)
        proxy_read_timeout    600s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    600s;
    }

    # FastAPI auto-generated docs (optional — disable in strict prod)
    location /docs {
        proxy_pass http://backend:8000/docs;
    }
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }
}
